name: Release Please

# Release automation for the sungrow-isolarcloud package.
#
#   1. On every push to main, release-please inspects the Conventional Commits
#      since the last release and maintains a "release PR" that bumps the version
#      in pyproject.toml and updates CHANGELOG.md.
#   2. Merging that release PR creates the git tag (e.g. v0.6.0) and the GitHub
#      release, and sets `release_created`.
#   3. When a release is created, the build/publish jobs below build the
#      distributions and publish them to PyPI via trusted publishing.
#
# The release tag is created with GITHUB_TOKEN, which by design does NOT trigger
# the tag-based publish.yml workflow — publishing is chained here via the
# `release_created` output instead, so a release is published exactly once.
#
# NOTE: build/publish are inlined here rather than delegated to publish.yml via
# `workflow_call`. PyPI Trusted Publishing does NOT support reusable workflows —
# the OIDC token / attestation carries the *parent* workflow ref, so a reusable
# publish job is rejected ("does not match expected Trusted Publisher"). Keeping
# the steps inline makes this workflow the top-level identity PyPI verifies.
# https://docs.pypi.org/trusted-publishers/troubleshooting/#reusable-workflows-on-github

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          # A PAT (secret RELEASE_PLEASE_TOKEN) makes the release PR trigger CI so
          # its required checks report and it can be merged normally. Without one,
          # it falls back to GITHUB_TOKEN — the PR is still opened, but CI won't
          # run on it, so a ruleset bypass actor (repo admin) must merge it.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            setup.py
      - name: Install build tools
        run: python -m pip install --upgrade pip build
      - name: Build distributions
        run: python -m build
      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    name: Publish release to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/sungrow-isolarcloud
    permissions:
      id-token: write
    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dists
          path: dist/
      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
