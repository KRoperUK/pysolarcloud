name: Release Please

# Release automation for the sungrow-isolarcloud package.
#
#   1. On every push to main, release-please inspects the Conventional Commits
#      since the last release and maintains a "release PR" that bumps the version
#      in pyproject.toml and updates CHANGELOG.md.
#   2. Merging that release PR creates the git tag (e.g. v0.6.0) and the GitHub
#      release, and sets `release_created`.
#   3. When a release is created, the reusable publish workflow builds the
#      distributions and publishes them to PyPI via trusted publishing.
#
# The release tag is created with GITHUB_TOKEN, which by design does NOT trigger
# the tag-based publish.yml workflow — publishing is chained here via the
# `release_created` output instead, so a release is published exactly once.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release
        with:
          # A PAT (secret RELEASE_PLEASE_TOKEN) makes the release PR trigger CI so
          # its required checks report and it can be merged normally. Without one,
          # it falls back to GITHUB_TOKEN — the PR is still opened, but CI won't
          # run on it, so a ruleset bypass actor (repo admin) must merge it.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish.yml
    secrets: inherit
