name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: .github/workflows/test.yml

      - name: Install ruff
        # Kept in sync with the sungrow-hass integration and the [dev] extra (#38) so
        # lint/format can't drift between the two repos that share code conventions.
        run: pip install ruff==0.15.21

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Check formatting
        run: ruff format --check src/ tests/

      - name: Install mypy
        # Pinned for reproducible type checks (a new mypy release can't change results
        # without a deliberate bump). Matches the sungrow-hass pin (#38).
        run: pip install mypy==2.2.0

      - name: Type check with mypy
        run: mypy

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Matches requires-python (>=3.12).
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            setup.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run tests with coverage
        # fail_under (pyproject [tool.coverage.report]) is enforced here by pytest-cov.
        run: pytest --cov=src/pysolarcloud --cov-report=term-missing --cov-report=xml

      # Upload coverage from a single matrix leg to avoid double-reporting. Mirrors the
      # integration; needs a CODECOV_TOKEN secret to report, but never fails CI without
      # one (fail_ci_if_error: false).
      - name: Upload coverage to Codecov
        if: ${{ matrix.python-version == '3.13' && !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false
